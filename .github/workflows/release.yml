name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    uses: ./.github/workflows/build-linux.yml

  build-macos:
    uses: ./.github/workflows/build-macos.yml

  build-windows:
    uses: ./.github/workflows/build-windows.yml

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: CyberFlash-linux-x86_64
          path: artifacts/linux/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: CyberFlash-macos
          path: artifacts/macos/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: CyberFlash-windows
          path: artifacts/windows/

      - name: Create archives
        run: |
          cd artifacts/linux && zip -r ../../CyberFlash-linux-x86_64.zip .
          cd artifacts/windows && zip -r ../../CyberFlash-windows.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            CyberFlash-linux-x86_64.zip
            artifacts/macos/CyberFlash-macos.dmg
            CyberFlash-windows.zip
